services:
  db:
    image: postgres:16
    container_name: library-db1
    networks:
      - backend

    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NDATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5433:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${NDATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5   
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library-api1
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING_ADMIN}
      - Jwt__Secret=${JWT_SECRET_USER}
      - Jwt__ClientSecret=${JWT_SECRET_CLIENT}
    ports:
      - "${API_PORT:-5000}:80"

networks:
  backend:
    driver: bridge

volumes:
  pgdata:
